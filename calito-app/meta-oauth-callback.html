<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Meta OAuth - Calito Casa da Limpeza</title>
  <style>
    :root { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #14213d; background: #f7f9fc; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: linear-gradient(145deg, #fff9ec, #f5fbff); }
    main { width: min(560px, 100%); background: #fff; border: 1px solid #efd2c0; border-radius: 18px; padding: 28px; box-shadow: 0 22px 60px rgba(28,36,58,.12); }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { line-height: 1.5; color: #4c5568; }
    .status { padding: 14px 16px; border-radius: 12px; background: #eefaf5; border: 1px solid #bfe6d4; color: #14532d; font-weight: 750; }
    .error { background: #fff1f0; border-color: #ffc7c2; color: #9f1d16; }
    code { word-break: break-all; }
    button { min-height: 44px; border: 0; border-radius: 12px; padding: 0 16px; color: #fff; background: linear-gradient(135deg, #fdc830, #f37335); font-weight: 800; cursor: pointer; }
    .muted { font-size: 13px; color: #687083; }
  </style>
</head>
<body>
  <main>
    <h1>Meta OAuth - Casa da Limpeza</h1>
    <div id="status" class="status">Verificando retorno da Meta...</div>
    <p id="details"></p>
    <button id="copy" hidden>Copiar codigo de autorizacao</button>
    <p class="muted">Esta pagina nao grava token, senha ou App Secret. O codigo de autorizacao e temporario e deve ser usado somente para concluir a troca segura pelo token.</p>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const hash = new URLSearchParams(location.hash.replace(/^#/, ""));
    const code = params.get("code");
    const error = params.get("error") || hash.get("error");
    const errorDescription = params.get("error_description") || hash.get("error_description");
    const state = params.get("state") || hash.get("state");
    const status = document.getElementById("status");
    const details = document.getElementById("details");
    const copy = document.getElementById("copy");

    if (error) {
      status.classList.add("error");
      status.textContent = "A Meta retornou erro na autorizacao.";
      details.textContent = errorDescription || error;
    } else if (code) {
      const masked = code.length > 12 ? `${code.slice(0, 6)}...${code.slice(-4)}` : "recebido";
      status.textContent = "Autorizacao recebida.";
      details.innerHTML = `Codigo recebido para o fluxo <code>${state || "sem state"}</code>: <code>${masked}</code>.`;
      copy.hidden = false;
      copy.addEventListener("click", async () => {
        await navigator.clipboard.writeText(code);
        copy.textContent = "Codigo copiado";
      });
    } else {
      status.classList.add("error");
      status.textContent = "Nenhum codigo de autorizacao foi encontrado.";
      details.textContent = "Repita o fluxo oficial da Meta usando o app Calito Casa da Limpeza.";
    }
  </script>
</body>
</html>
