name: Publicar Calito no GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'calito-app/**'
      - '.github/workflows/calito-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: calito-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Enviar artefato estático
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./calito-app

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
