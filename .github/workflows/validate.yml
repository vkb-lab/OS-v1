name: Validate K-OS Foundation

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - feat/**
      - fix/**

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
      - name: Compile Python
        run: python -m compileall apps
      - name: Validate required files
        run: |
          test -f apps/dashboard/index.html
          test -f apps/api/main.py
          test -f Dockerfile
